$kind: http-request
name: Get All Users - Empty List Handling
method: GET
url: '{{baseUrl}}/users'
order: 3000
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is an array (even if empty)", function () {
          const json = pm.response.json();
          pm.expect(json).to.be.an('array');
      });

      pm.test("Response body is not null", function () {
          pm.expect(pm.response.json()).to.not.be.null;
      });
    language: text/javascript
